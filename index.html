<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Co-Admin Bot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 48px; text-align: center; max-width: 480px; width: 90%; }
  .logo { font-size: 64px; margin-bottom: 16px; }
  h1 { font-size: 28px; color: #58a6ff; margin-bottom: 8px; }
  p { color: #8b949e; margin-bottom: 32px; }
  .status { display: inline-flex; align-items: center; gap: 8px; background: #0d1f0d; border: 1px solid #238636; border-radius: 20px; padding: 6px 16px; margin-bottom: 32px; font-size: 14px; color: #3fb950; }
  .dot { width: 8px; height: 8px; background: #3fb950; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  a.btn { display: inline-block; background: #1f6feb; color: #fff; text-decoration: none; padding: 12px 32px; border-radius: 8px; font-weight: 600; transition: background .2s; }
  a.btn:hover { background: #388bfd; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🤖</div>
  <h1>Co-Admin Bot</h1>
  <p>Dein Discord-Bot für Steal the Brainrot</p>
  <div class="status"><div class="dot"></div>Online</div>
  <br>
  <a class="btn" href="/admin">⚙️ Admin Panel öffnen</a>
</div>
</body>
</html>
